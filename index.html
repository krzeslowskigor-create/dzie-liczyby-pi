<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Głosowanie Dzień Pi - XX LO</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #6c5ce7;
            --dark-bg: #050a18;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: white;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animowane tło z symbolami Pi */
        .pi-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            font-size: 2rem;
            color: rgba(0, 210, 255, 0.05);
        }

        header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid var(--neon-purple);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            font-size: 1.8rem;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .school-tag {
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Panel Skanera */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: none !important;
        }

        /* Tabela Wyników */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th {
            background: var(--neon-purple);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
        }

        tr.winner {
            background: rgba(0, 210, 255, 0.2);
            font-weight: bold;
            box-shadow: inset 4px 0 0 var(--neon-blue);
        }

        /* Komunikaty */
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            animation: fadeIn 0.5s;
        }
        .alert-success { background: rgba(46, 204, 113, 0.3); border: 1px solid #2ecc71; color: #2ecc71; }
        .alert-error { background: rgba(231, 76, 60, 0.3); border: 1px solid #e74c3c; color: #e74c3c; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .stats-summary {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--neon-blue);
        }

    </style>
</head>
<body>

    <div class="pi-bg" id="pi-bg"></div>

    <header>
        <div class="school-tag">XX Liceum Ogólnokształcące</div>
        <h1>𝜋 DZIEŃ LICZBY PI 2026 𝜋</h1>
    </header>

    <div class="container">
        
        <div id="status-msg" class="alert"></div>

        <div class="card">
            <h3 style="margin-top:0"><span id="user-status">📷 Zeskanuj kod stacji</span></h3>
            <div id="reader"></div>
        </div>

        <div class="card">
            <div class="stats-summary">
                <span>RANKING STACJI</span>
                <span id="total-votes-display">Suma głosów: 0</span>
            </div>
            <table id="results-table">
                <thead>
                    <tr>
                        <th>STACJA</th>
                        <th>GŁOSY</th>
                        <th>PROCENT</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    </tbody>
            </table>
        </div>

    </div>

    <script>
        // --- KONFIGURACJA ---
        const TOTAL_STATIONS = 22;
        let votes = JSON.parse(localStorage.getItem('pi_votes_data')) || {};
        
        // Inicjalizacja głosów dla każdej stacji
        if (Object.keys(votes).length === 0) {
            for(let i=1; i<=TOTAL_STATIONS; i++) votes[i] = 0;
        }

        // --- TŁO PI ---
        const bg = document.getElementById('pi-bg');
        for(let i=0; i<30; i++) {
            const pi = document.createElement('div');
            pi.innerText = 'π';
            pi.style.position = 'absolute';
            pi.style.left = Math.random() * 100 + 'vw';
            pi.style.top = Math.random() * 100 + 'vh';
            pi.style.opacity = Math.random() * 0.1;
            bg.appendChild(pi);
        }

        // --- LOGIKA GŁOSOWANIA ---
        function registerVote(stationId) {
            const alreadyVoted = localStorage.getItem('user_has_voted');
            const statusDiv = document.getElementById('status-msg');

            if (alreadyVoted) {
                showStatus("❌ Już oddałeś swój głos! Nie możesz głosować ponownie.", "error");
                return;
            }

            if (stationId < 1 || stationId > TOTAL_STATIONS) {
                showStatus("⚠️ Nieprawidłowy kod stacji!", "error");
                return;
            }

            // Dodaj głos
            votes[stationId]++;
            localStorage.setItem('pi_votes_data', JSON.stringify(votes));
            localStorage.setItem('user_has_voted', 'true');
            
            showStatus(`✅ Sukces! Oddano głos na Stację nr ${stationId}.`, "success");
            updateUI();
        }

        function showStatus(msg, type) {
            const statusDiv = document.getElementById('status-msg');
            statusDiv.innerText = msg;
            statusDiv.className = `alert alert-${type}`;
            statusDiv.style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateUI() {
            const tbody = document.getElementById('results-body');
            const totalDisplay = document.getElementById('total-votes-display');
            const userStatus = document.getElementById('user-status');
            
            if(localStorage.getItem('user_has_voted')) {
                userStatus.innerText = "🔒 Twój głos został zapisany";
            }

            // Oblicz sumę
            let totalVotes = Object.values(votes).reduce((a, b) => a + b, 0);
            totalDisplay.innerText = `Suma głosów: ${totalVotes}`;

            // Przygotuj dane do sortowania
            let sortedData = [];
            for(let id in votes) {
                sortedData.push({ id: id, count: votes[id] });
            }
            sortedData.sort((a, b) => b.count - a.count);

            // Generuj tabelę
            tbody.innerHTML = '';
            const maxVotes = Math.max(...Object.values(votes));

            sortedData.forEach(item => {
                const tr = document.createElement('tr');
                if (item.count === maxVotes && maxVotes > 0) tr.className = 'winner';
                
                const percent = totalVotes > 0 ? Math.round((item.count / totalVotes) * 100) : 0;
                
                tr.innerHTML = `
                    <td>Stacja ${item.id}</td>
                    <td>${item.count}</td>
                    <td>${percent}%</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // --- SKANER QR ---
        function onScanSuccess(decodedText) {
            // Oczekujemy formatu: "station-X" gdzie X to numer
            if (decodedText.includes('station-')) {
                const stationNum = parseInt(decodedText.split('-')[1]);
                registerVote(stationNum);
            } else {
                showStatus("⚠️ To nie jest prawidłowy kod stacji Dnia Pi!", "error");
            }
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: {width: 250, height: 250},
            aspectRatio: 1.0
        });
        html5QrcodeScanner.render(onScanSuccess);

        // Inicjalizacja widoku
        updateUI();

    </script>
</body>
</html>
